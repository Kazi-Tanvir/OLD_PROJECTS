<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBSE 18 MacBook Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Ubuntu+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            /* Fullscreen background image */
                        /* Fullscreen background image */
            background: url('image-aquq.png') no-repeat center center fixed;
            background-color: #001a1a;
            font-family: 'Share Tech Mono', 'Ubuntu Mono', monospace;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }

        /* MacBook Terminal Window Styling */
        .mac-window {
            background-color: rgba(0, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.05) inset;
        }

        .title-bar {
            background: #003333;
            border-bottom: 1px solid #001a1a;
        }

        /* Glow Effects */
        .text-shadow-glow {
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8), 0 0 15px rgba(0, 255, 255, 0.3);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00cccc;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-12 flex flex-col items-center justify-center">

    <!-- MacBook Window Container -->
    <div class="mac-window w-full max-w-6xl mx-auto rounded-xl overflow-hidden flex flex-col">

        <!-- macOS Title Bar -->
        <div class="title-bar h-8 w-full flex items-center px-4 gap-2 relative">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56] shadow-inner"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e] shadow-inner"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f] shadow-inner"></div>
            </div>
            <div
                class="absolute w-full text-center text-xs text-gray-400 font-sans tracking-wide left-0 pointer-events-none">
                bash - du@iit - 100x35
            </div>
        </div>

        <!-- Terminal Content Area -->
        <div id="terminal-window" class="p-6 md:p-8 flex flex-col flex-grow justify-center">

            <div class="flex flex-col md:flex-row gap-8 md:gap-8 items-center">

                <!-- Left Side: ASCII Art (18) -->
                <div id="ascii-art"
                    class="text-[6px] sm:text-[8px] md:text-[11px] lg:text-[12px] leading-[1.4] tracking-[0.15em] whitespace-nowrap mt-1">
                    <!-- JavaScript will inject the 18 design here instantly -->
                </div>

                <!-- Right Side: System Info -->
                <div id="sys-info" class="flex flex-col text-sm md:text-base lg:text-lg text-cyan-500 leading-snug">
                    <div class="font-bold mb-1 text-xl flex items-center gap-2 text-cyan-400 text-shadow-glow">
                        du@iit
                    </div>
                    <div class="text-cyan-900 mb-2 font-bold">-----------------</div>

                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">OS:</span>Ubuntu 24.04 LTS</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Host:</span> BSSE Terminal
                        node-18</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">University:</span> Dhaka</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Department:</span> IIT</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Version:</span> BSSE v18</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Students:</span> 47 (Active
                        Nodes)</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Session:</span> 2025-26</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-24">Uptime:</span> <span
                            id="uptime">0 days, 0 mins</span></div>

                    <!-- Color Blocks for Aqua Theme -->
                    <div class="flex gap-0 mt-4">
                        <div class="w-5 h-5 bg-[#004d4d]"></div>
                        <div class="w-5 h-5 bg-[#006666]"></div>
                        <div class="w-5 h-5 bg-[#008080]"></div>
                        <div class="w-5 h-5 bg-[#009999]"></div>
                        <div class="w-5 h-5 bg-[#00b2b2]"></div>
                        <div class="w-5 h-5 bg-[#00cccc]"></div>
                        <div class="w-5 h-5 bg-[#00e5e5]"></div>
                        <div class="w-5 h-5 bg-[#00ffff]"></div>
                    </div>
                </div>
            </div>

            <!-- Terminal Command Prompt -->
            <div class="mt-8 text-sm md:text-lg font-bold w-full text-cyan-500">
                <span class="text-cyan-400 text-shadow-glow">du@iit</span>:<span class="text-cyan-600">~</span>$
                <span class="inline-block w-2.5 md:w-3 h-5 md:h-6 bg-cyan-400 align-middle animate-pulse ml-1"></span>
            </div>

        </div>
    </div>

    <script>
        // Data provided by user
        const names = [
            "Shafin", "Fatin", "Pramanik", "Yusha", "Abir", "Siddik", "Limon", "Araf",
            "Mahadi", "Shobhon", "Sadman", "Tanvir", "Najibah", "Aadib", "Ahnaf",
            "Tamim", "Samir", "Suraiya", "Tanim", "Nasif", "Shuvo", "Hasnat",
            "Nahian", "Fahim", "Bashar", "Syeda", "Tasib", "Zawat", "Snaho",
            "Hasib", "Turjo", "Parthib", "Risal", "Armita", "Tahsin", "Mahafujar",
            "Sajid", "Saiful", "Nubala", "Topu", "Zubaira", "Sabiha", "Ahmed",
            "Rafiu", "Bushra", "Sadik", "Shibli"
        ];

        const rawShape = [
            "  1111      1111  00000000000000000000     @@@@@@@@@@@        @@@@@@@@@@@@@@@@@@@@     ",
            "  1111      1111  00000000000000000000   @@@@@@@@@@@@@      @@@@@@@@@@@@@@@@@@@@@@@@   ",
            "  1111      1111          0000         @@@@@@   @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000        @@@@@@    @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@      @@@@@              @@@@@   ",
            "  1111      1111          0000      111111      @@@@@@       @@@@@@@@@@@@@@@@@@@@@@    ",
            "  1111      1111          0000      111111      @@@@@@       @@@@@@@@@@@@@@@@@@@@@@    ",
            "  1111      1111          0000                  @@@@@@      @@@@@              @@@@@   ",
            "  1111      1111          0000                  @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@     @@@@@@              @@@@@@  ",
            "  1111      1111          0000                  @@@@@@      @@@@@@@@@@@@@@@@@@@@@@@@  ",
            "  1111      1111          0000                  @@@@@@        @@@@@@@@@@@@@@@@@@@@     ",
            "                                                                                       "
        ];

        // Shuffle names initially to create a random but guaranteed queue
        let unplacedQueue = [...names].sort(() => Math.random() - 0.5);
        const allNames = [...names];
        let isPrimaryColor = true;

        // Algorithm to Guarantee every name is used exactly once before repeating
        function getBestName(maxLen) {
            for (let i = 0; i < unplacedQueue.length; i++) {
                if (unplacedQueue[i].length <= maxLen) {
                    let chosen = unplacedQueue.splice(i, 1)[0];
                    return chosen;
                }
            }
            let allCandidates = allNames.filter(n => n.length <= maxLen);
            if (allCandidates.length > 0) {
                return allCandidates[Math.floor(Math.random() * allCandidates.length)];
            }
            return null;
        }

        // Fills a contiguous block of '@'s with whole names
        function fillSegmentHTML(L) {
            let resultHTML = "";
            let currentLen = 0;

            while (currentLen < L) {
                let remaining = L - currentLen;
                let needsSeparator = currentLen > 0 ? 1 : 0;

                let name = getBestName(remaining - needsSeparator);

                if (name) {
                    if (needsSeparator) {
                        resultHTML += `<span class="text-cyan-900 opacity-60">.</span>`;
                        currentLen += 1;
                    }
                    isPrimaryColor = !isPrimaryColor;

                    // Restored the original aqua glow theme
                    let colorClass = isPrimaryColor
                        ? 'text-cyan-300 font-bold text-shadow-glow'
                        : 'text-cyan-500 font-bold';

                    resultHTML += `<span class="${colorClass}">${name.toUpperCase()}</span>`;
                    currentLen += name.length;
                } else {
                    let padChar;
                    if (currentLen === 0 || currentLen === L - 1) {
                        padChar = "|";
                    } else {
                        const padChars = ".-";
                        padChar = padChars[Math.floor(Math.random() * padChars.length)];
                    }
                    resultHTML += `<span class="text-cyan-400 font-bold">${padChar}</span>`;
                    currentLen += 1;
                }
            }
            return resultHTML;
        }

        // Render the ASCII Art instantly
        function renderNumberEighteen() {
            const asciiContainer = document.getElementById('ascii-art');
            let fullHTML = "";

            for (let r = 0; r < rawShape.length; r++) {
                let line = rawShape[r];
                let rowHTML = "<div>";
                let i = 0;

                while (i < line.length) {
                    if (line[i] === '@') {
                        let start = i;
                        while (i < line.length && line[i] === '@') i++;
                        let blockLength = i - start;
                        rowHTML += fillSegmentHTML(blockLength);
                    } else if (line[i] === '1' || line[i] === '0') {
                        const bit = Math.random() > 0.5 ? '1' : '0';
                        rowHTML += `<span class="text-cyan-500 font-bold">${bit}</span>`;
                        i++;
                    } else {
                        rowHTML += '<span class="invisible">X</span>';
                        i++;
                    }
                }
                rowHTML += "</div>";
                fullHTML += rowHTML;
            }

            asciiContainer.innerHTML = fullHTML;
        }

        // Fake uptime counter just for cool aesthetic
        function startUptime() {
            const uptimeEl = document.getElementById('uptime');
            let mins = 47; // starts at some random active time
            setInterval(() => {
                mins++;
                let hours = Math.floor(mins / 60);
                let displayMins = mins % 60;
                uptimeEl.innerText = `${hours} hours, ${displayMins} mins`;
            }, 60000);
            uptimeEl.innerText = `105 hours, 18 mins`;
        }

        window.onload = () => {
            renderNumberEighteen();
            startUptime();
        };
    </script>
</body>

</html>
