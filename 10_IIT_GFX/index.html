<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBSE 18 MacBook Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Ubuntu+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            /* Fullscreen background image */
            background: url('image-aqua.png') no-repeat center center fixed;
            background-position:  center top;

            background-size: cover;
            font-family: 'Share Tech Mono', 'Ubuntu Mono', monospace;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }

        /* MacBook Terminal Window Styling */
        .mac-window {
            background-color: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .title-bar {
            background: #2d2d2d;
            border-bottom: 1px solid #1a1a1a;
        }

        /* Glow Effects */
        .text-shadow-glow {
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.8), 0 0 15px rgba(34, 211, 238, 0.3);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #06b6d4;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0891b2;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-12 flex flex-col items-center justify-center">

    <!-- Top Left Logo -->
    <div class="fixed top-6 left-6 z-50 flex items-center gap-4 h-32">
        <img src="logo.png" alt="Logo"
            class="h-full w-auto opacity-100 hover:opacity-100 transition-opacity duration-300">
        
        <!-- Vertical Line -->
        <div class="w-[2px] bg-white/30 h-[80%] self-center"></div>

        <!-- University Name -->
        <div class="flex flex-col h-full text-cyan-500 font-bold uppercase" style="font-size: 3.5rem;">
            <div class="whitespace-nowrap tracking-[-0.1em] leading-[1] ">UNIVERSITY</div>
            <div class="whitespace-nowrap tracking-[-0.1em] leading-[1]">OF DHAKA</div>
        </div>
    </div>

    <!-- MacBook Window Container -->
    <div class="mac-window w-full max-w-6xl mx-auto rounded-xl overflow-hidden flex flex-col">

        <!-- macOS Title Bar -->
        <div class="title-bar h-8 w-full flex items-center px-4 gap-2 relative">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56] shadow-inner"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e] shadow-inner"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f] shadow-inner"></div>
            </div>
            <div
                class="absolute w-full text-center text-xs text-gray-400 font-sans tracking-wide left-0 pointer-events-none">
                bash - du@iit - 100x35
            </div>
        </div>

        <!-- Terminal Content Area -->
        <div id="terminal-window" class="p-6 md:p-8 flex flex-col flex-grow justify-center min-h-[500px]">
            

            <div class="flex flex-col md:flex-row gap-8 md:gap-8 items-center">

                <!-- Left Side: ASCII Art (18) -->
                <div id="ascii-art"
                    class="text-[6px] sm:text-[8px] md:text-[11px] lg:text-[12px] leading-[1.4] tracking-[0.15em] whitespace-nowrap mt-1">
                    <!-- JavaScript will inject the 18 design here instantly -->
                </div>

                <!-- Right Side: System Info -->
                <div id="sys-info" class="flex flex-col text-sm md:text-base lg:text-lg text-cyan-500 leading-snug">
                    <div class="font-bold mb-1 text-xl flex items-center gap-2 text-cyan-400 text-shadow-glow">
                        du@iit
                    </div>
                    <div class="text-cyan-700 mb-2 font-bold">-----------------</div>

                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">OS:</span>Ubuntu 24.04 LTS</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Host:</span> BSSE Terminal
                        18</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">University:</span> Dhaka
                        University</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Department:</span> IIT</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Version:</span> BSSE v18</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Students:</span> 49 (Active
                        Nodes)</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Session:</span> 2025-26</div>
                    <div class="flex gap-2"><span class="text-cyan-400 font-bold w-32">Uptime:</span> <span
                            id="uptime">0 days, 0 mins</span></div>

                    <!-- Color Blocks for Hacker Aqua Theme -->
                    <div class="flex gap-0 mt-4">
                        <div class="w-5 h-5 bg-[#083344]"></div>
                        <div class="w-5 h-5 bg-[#164e63]"></div>
                        <div class="w-5 h-5 bg-[#155e75]"></div>
                        <div class="w-5 h-5 bg-[#0e7490]"></div>
                        <div class="w-5 h-5 bg-[#0891b2]"></div>
                        <div class="w-5 h-5 bg-[#06b6d4]"></div>
                        <div class="w-5 h-5 bg-[#22d3ee]"></div>
                        <div class="w-5 h-5 bg-[#67e8f9]"></div>
                    </div>
                </div>
            </div>

            <!-- Terminal Command Prompt -->
            <div class="mt-8 text-sm md:text-lg font-bold w-full text-cyan-500">
                <span class="text-cyan-400 text-shadow-glow">du@iit</span> :<span class="text-cyan-600">~</span>$<span
                    class="text-cyan-300  opacity-80 md:ml-1">Professionalism • Excellence • Respect</span>
                <span class="inline-block w-2.5 md:w-3 h-5 md:h-6 bg-cyan-400 align-middle animate-pulse ml-1"></span>
            </div>

        </div>
    </div>



    <script>

        const names = [
            "Turjo", "Ahnaf", "Siddik", "Aadib", "Armita", "Tasmiah", "Rifa", "Najibah",
            "Yusha", "Suraiya", "Sabiha", "Bushra", "Nubala", "Tamim", "Pretom", "Zawat",
            "Mahadi", "Nahian", "Risal", "Fahim", "Abdullah", "Tasib", "Topu", "Abir", "Parthib",
            "Mahmudullah", "Hasib", "Hasnath", "Saiful", "Araf", "Fatin", "Rafiul", "Sadman", "Samir",
            "Shobhon", "Snaho", "Shafin", "Devraj", "Mahafuj", "Tahsin", "Rudro", "Tanvir", "Shibli",
            "Tanim", "Sajid", "Nasif", "Ramin" , "Safin" , "Nafis"
        ];
        const rawShape = [
            "   11111     11111  0000000000000000000      @@@@@@@@@@@        @@@@@@@@@@@@@@@@@@@@     ",
            "   11111     11111  0000000000000000000    @@@@@@@@@@@@@      @@@@@@@@@@@@@@@@@@@@@@@@   ",
            "   11111     11111         00000         @@@@@@   @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@      @@@@@              @@@@@   ",
            "   11111     11111         00000                  @@@@@@       @@@@@@@@@@@@@@@@@@@@@@    ",
            "   11111     11111         00000      111111      @@@@@@       @@@@@@@@@@@@@@@@@@@@@@    ",
            "   11111     11111         00000      111111      @@@@@@      @@@@@              @@@@@   ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@     @@@@@@              @@@@@@  ",
            "   11111     11111         00000                  @@@@@@      @@@@@@@@@@@@@@@@@@@@@@@@  ",
            "   11111     11111         00000                  @@@@@@        @@@@@@@@@@@@@@@@@@@@     ",
            "                                                                                       "
        ];

        // Shuffle names initially to create a random but guaranteed queue
        let unplacedQueue = [...names].sort(() => Math.random() - 0.5);
        const allNames = [...names];
        let isPrimaryColor = true;

        // Algorithm to Guarantee every name is used exactly once before repeating
        function getBestName(maxLen) {
            for (let i = 0; i < unplacedQueue.length; i++) {
                if (unplacedQueue[i].length <= maxLen) {
                    let chosen = unplacedQueue.splice(i, 1)[0];
                    return chosen;
                }
            }
            let allCandidates = allNames.filter(n => n.length <= maxLen);
            if (allCandidates.length > 0) {
                return allCandidates[Math.floor(Math.random() * allCandidates.length)];
            }
            return null;
        }

        // Fills a contiguous block of '@'s with whole names
        function fillSegmentHTML(L) {
            let resultHTML = "";
            let currentLen = 0;

            while (currentLen < L) {
                let remaining = L - currentLen;
                let needsSeparator = currentLen > 0 ? 1 : 0;

                let name = getBestName(remaining - needsSeparator);

                if (name) {
                    if (needsSeparator) {
                        resultHTML += `<span class="text-cyan-800 opacity-60">.</span>`;
                        currentLen += 1;
                    }
                    isPrimaryColor = !isPrimaryColor;

                    // Restored the original aqua glow theme
                    let colorClass = isPrimaryColor
                        ? 'text-cyan-300 font-bold text-shadow-glow'
                        : 'text-cyan-400 font-bold';

                    resultHTML += `<span class="${colorClass}">${name.toUpperCase()}</span>`;
                    currentLen += name.length;
                } else {
                    let padChar;
                    if (currentLen === 0 || currentLen === L - 1) {
                        padChar = "|";
                    } else {
                        const padChars = ".-";
                        padChar = padChars[Math.floor(Math.random() * padChars.length)];
                    }
                    resultHTML += `<span class="text-cyan-400 font-bold">${padChar}</span>`;
                    currentLen += 1;
                }
            }
            return resultHTML;
        }

        // Render the ASCII Art instantly
        function renderNumberEighteen() {
            const asciiContainer = document.getElementById('ascii-art');
            let fullHTML = "";

            for (let r = 0; r < rawShape.length; r++) {
                let line = rawShape[r];
                let rowHTML = "<div>";
                let i = 0;

                while (i < line.length) {
                    if (line[i] === '@') {
                        let start = i;
                        while (i < line.length && line[i] === '@') i++;
                        let blockLength = i - start;
                        rowHTML += fillSegmentHTML(blockLength);
                    } else if (line[i] === '1' || line[i] === '0') {
                        const bit = Math.random() > 0.5 ? '1' : '0';
                        const colorClass = bit === '0' ? 'text-cyan-300' : 'text-cyan-400';
                        rowHTML += `<span class="${colorClass} font-bold">${bit}</span>`;
                        i++;
                    } else {
                        rowHTML += '<span class="invisible">X</span>';
                        i++;
                    }
                }
                rowHTML += "</div>";
                fullHTML += rowHTML;
            }

            asciiContainer.innerHTML = fullHTML;
        }

        // Fake uptime counter just for cool aesthetic
        function startUptime() {
            const uptimeEl = document.getElementById('uptime');
            let mins = 49; // starts at some random active time
            setInterval(() => {
                mins++;
                let hours = Math.floor(mins / 60);
                let displayMins = mins % 60;
                uptimeEl.innerText = `${hours} hours, ${displayMins} mins`;
            }, 60000);
            uptimeEl.innerText = `105 hours, 18 mins`;
        }

        window.onload = () => {
            renderNumberEighteen();
            startUptime();
        };
    </script>
</body>

</html>
